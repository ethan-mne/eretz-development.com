<head>

<body class="d-flex align-items-center justify-content-center" style="min-height: 100vh;">

        <h2 class="mt-4" style="padding-top:202px;">Bienvenue</h2>
        <form action="results.php" method="GET" class="mt-4">
            <div class="input-group mt-4">
                <input type="text" name="recherche" id="recherche" class="form-control"
                    placeholder="Écrivez votre nom..." autocomplete="off">
            </div>
            <div id="suggestions" class="mt-2"></div>
            <div class="input-group-append mt-4">
                <button type="submit" class="btn btn-primary">Rechercher</button>
            </div>
        </form>
    </div>

    <script>
    $(document).ready(function() {
    $('#recherche').on('input', function() {
        var recherche = $(this).val();

        if (recherche.length > 0) {
            $.ajax({
                url: 'script.php',
                type: 'GET',
                data: {
                    recherche: recherche
                },
                success: function(data) {
                    $('#suggestions').html(data).show();
                    
                    // Remove existing highlights
                    $('#suggestions li').removeClass('highlight');
                    
                    // Highlight matching suggestions
                    $('#suggestions li:contains(' + recherche + ')').addClass('highlight');
                },
                error: function(xhr, status, error) {
                    console.error('AJAX Error:', status, error);
                }
            });
        } else {
            $('#suggestions').hide();
        }
    });

    // Gérer la sélection d'une suggestion
    $(document).on('click', '#suggestions li', function() {
        var suggestion = $(this).text();
        $('#recherche').val(suggestion);
        $('#suggestions').hide();
    });

    // Masquer les suggestions lorsque le formulaire est soumis
    $('form').submit(function() {
        $('#suggestions').hide();
    });
});

    </script>
</body>

</html>
